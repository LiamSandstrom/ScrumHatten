    <script>

<link rel="stylesheet" href="~/css/login.css/">
<div class="loginContainer">
    <form id>
        <h1 class="h3 mb-3 fw-normal">Logga in</h1>

        <div class="form-floating">
            <input type="email" class="form-control" id="floatingInput" placeholder="namn@exempel.com">
            <label for="floatingInput">Email</label>
            <p id="error-Email" class="error-text"></p>
        </div>

        <div class="form-floating">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Lösenord">
            <label for="floatingPassword">Lösenord</label>
            <p id="error-Password" class="error-text"></p>
        </div>

        <div class="form-check text-start my-3">
            <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
            <label class="form-check-label" for="checkDefault">Kom ihåg mig</label>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">Logga in</button>
    </form>
</div>
